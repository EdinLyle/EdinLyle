name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"         # 每天 0 点（UTC）跑一次，可按需修改
  workflow_dispatch:             # 手动触发
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      # 提前使用 Node 24，避免 Node 20 废弃后出问题
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # 避免 git 凭据冲突

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: EdinLyle   # 这里改成你的 GitHub 用户名
          outputs: |
            dist/snake.svg

      - name: Deploy snake.svg to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output       # 目标分支
          folder: dist         # 发布 dist 目录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
