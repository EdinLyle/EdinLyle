name: Generate Snake

on:
  # 每天 0 点（UTC）自动生成一次，按需改时间
  schedule:
    - cron: "0 0 * * *"
  # 手动触发
  workflow_dispatch:
  # 当你给 README push 的时候也可以顺带更新
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      # 提前切到 Node 24，避免 Node 20 废弃时出现兼容问题
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 重要：避免和后续 push 使用的 token 冲突
          persist-credentials: false

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: EdinLyle
          outputs: |
            dist/snake.svg

      # 把 dist 目录内容推到 output 分支
      - name: Deploy snake.svg to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output       # 目标分支
          folder: dist         # 要发布的目录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
